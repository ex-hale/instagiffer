#
# Instagiffer Configuration - Happy Tweaking!
#

[settings]

# Set to False if you don't want Instagiffer to delete duplicate frames.
# Note, frames must be -completely- identical for deletion to occur
autoDeleteDuplicateFrames=True
# Delete all temporary files and downloads upon closing Instagiffer
deleteTempFilesOnClose=False
# Save over top of the last GIF
overwriteGif=True
# Leave this set to True always
fixSlowdownGlitch=True
# Cache thumbnail previews to disk
cacheThumbs=True
# Allow Preview GIF window to be resized -still testing
resizablePlayer=False
# Delay before frames are extracted in milliseconds (1000 milliseconds = 1 second)
idleProcessTimeoutMs=2500
# Auto-extract frames after idleProcessTimeoutSec.
# If false, you need to right-click the preview frame to update
autoExtract=True
# Automatically show preview when editing effects
autoPreview=True
# Default download quality
downloadQuality=Medium
# If a GIF is greater than this (number of frames), it will be considered large
largeGif=500

[paths]

# Uncomment this line to change where Instagiffer stores temporary files
#workingDir=C:\instaTemp
# Choose a different output path AND file name for insta.gif (default = Desktop)
gifOutputPath=default
# If non-latin characters are detected in the path, automatically fall back to this directory
failSafeDir=C:\instagiffer_data


[size]

cropEnabled=False
cropOffsetX=0
cropOffsetY=0
cropWidth=0
cropHeight=0
resizePostCrop=100
# Set to True to compress final gif file
fileOptimizer=False


[color]

# Number of colors: 1 to 255 - This setting maps to the Quality slider
numColors=210
# CMYK, RGB, or Gray
colorSpace=CMYK
# -100 to +100
saturation=0

[length]

startTime=00:00:00.0
# Default duration. Setting to 0.0 will cause the default duration to be set to max
durationSec=3.0

[rate]

# 0 means infinite
numLoops=0
maxFrameRate=30
frameRate=10
# Maps to playback rate
speedModifier=0
# Still testing this. Applies only to GIF. frameIdx:millisecondDelay,...
# eg 0:10000,5:1000
customFrameTimingMs=

[captiondefaults]

outlineColor=#000000
outlineSize=1
# Leave blank for best suggestion. Or set your own: Arial for example
captionFont=
fontSize=26pt
fontStyle=Regular
fontColor=#ffffff
opacity=100
applyFx=False
dropShadow=False
position=Bottom
# How far from the image edge to place text
margin=9
# Space between multi-lined text. 0 is normal. Values can be negative
interlineSpacing=0

[caption1]
[caption2]
[caption3]
[caption4]
[caption5]
[caption6]
[caption7]
[caption8]
[caption9]
[caption10]
[caption11]
[caption12]
[caption13]
[caption14]
[caption15]
[caption16]

# Use this for your logo

[imagelayer1]

path=
applyFx=False
positioning=Bottom Left
resize=100
opacity=100
xNudge=2
yNudge=2

[blend]

cinemagraph=False
cinemagraphKeyFrameIdx=0
cinemagraphInvert=False
cinemagraphUseTransparency=False

[effects]

# -100 to +100 (0 means no change)
brightness=0
# -100 to +100 (0 means no change)
contrast=+5

blur=0

# Color fade
desaturationAmount=100

# Sepia Tone
sepiaTone=False
sepiaToneAmount=80

# Oil Paint
oilPaint=False

# Vignette
fadeEdges=False

# Enhance
fuzz=0%
sharpen=True

# Color tint
colorTint=False
colorTintAmount=100
colorTintColor=#0000ff

# Border
border=False
borderColor=#000000
borderSize=5

# Nashville
nashville=False

[screencap]

# You can set this value to zero if you find it annoying
countDownSeconds=3
# Setting this to False will result in faster FPS, but more RAM usage during capture
directToDisk=False
# Maximum allowable fps
frameRateLimit=24
# Web-optimization: If the width or height exceeds this value, scale it down to fit.
# This is to prevent ridiculous screen cap dimensions. Only works if Direct2Disk is disabled
webMaxWidthHeight=512
# Web-optimization: Reasonable FPS for online posting
webMaxFps=12
# Default size of the screen capture dialog (WxH). Leave blank for default
dimensions=640x480
# Optional fixed position of the screen capture dialog (X,Y). Uncomment to override
#position=100,100

[keybindings]

# Use Mod+ for platform-independent modifier (Command on macOS, Control on Windows)
createGif=Mod+g
loadVideo=Mod+o
editEffects=Mod+e
editCaption=Mod+t
manualCrop=Mod+k

# Windows paths
[paths-win32]

convert=.\deps\win\magick.exe
gifsicle=.\deps\win\gifsicle.exe
ffmpeg=.\deps\win\ffmpeg.exe
youtubeDL=.\deps\win\yt-dlp.exe

# Mac paths (bundled in deps/mac/)
[paths-darwin]

convert=./deps/mac/magick
ffmpeg=./deps/mac/ffmpeg
youtubeDL=./deps/mac/yt-dlp
gifsicle=./deps/mac/gifsicle
